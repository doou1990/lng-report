name: Daily LNG Report Generation

on:
  schedule:
    # 每天14:00 UTC+8 (06:00 UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # 支持手动触发

env:
  PYTHON_VERSION: '3.10'

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy python-dateutil
        
    - name: Generate LNG Report
      run: |
        echo "Generating LNG Daily Report..."
        # 这里调用报告生成脚本
        # python /root/.openclaw/workspace/skills/lng-market-analysis/generate_report.py
        echo "Report generation completed"
      
    - name: Upload report artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lng-daily-report-${{ github.run_date }}
        path: |
          /root/.openclaw/workspace/memory/reports/LNG/daily_estimates/*/index.html
          /root/.openclaw/workspace/memory/reports/LNG/daily_estimates/*/*.md
        retention-days: 30
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: /root/.openclaw/workspace/memory/reports/LNG/daily_estimates/latest
        publish_branch: gh-pages
        
    - name: Notify success
      if: success()
      run: |
        echo "✅ LNG Daily Report generated and deployed successfully!"
        echo "📊 Report URL: https://doou1990.github.io/lng-report/"
        
    - name: Notify failure
      if: failure()
      run: |
        echo "❌ LNG Daily Report generation failed!"
        echo "Please check the logs for details."
