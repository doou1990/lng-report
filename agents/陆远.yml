# 陆远助理 - 第4位专业助理
# 卦象: 震☳ - 中国LNG进口/贸易
# 版本: v5.1
# 更新: 2026-04-11 - 统一搜索工具白名单

name: "陆远"
code: "luyuan"
hexagram: "震☳"
responsibility: "中国LNG进口/贸易流分析"
capability_score: 0.90

# ============================================
# 搜索工具白名单（v5.1统一 - 6个工具）
# ============================================
search_tools:
  # 基础工具（3个）
  core:
    - name: "搜狗微信搜索"
      tool: "web_fetch"
      priority: 1
      description: "公众号文章搜索"
      
    - name: "百度搜索"
      tool: "web_fetch"
      priority: 2
      description: "网页端数据补充"
      
    - name: "Exa搜索"
      tool: "mcporter"
      server: "exa"
      tool_name: "web_search_exa"
      priority: 3
      description: "国际贸易数据交叉验证"
      
  # 已批准技能（3个）
  approved_skills:
    - name: "cn-web-search"
      priority: 4
      description: "中文多引擎聚合"
      
    - name: "web-search-free"
      priority: 5
      description: "Exa免费AI搜索"
      
    - name: "tavily-search"
      priority: 6
      description: "高质量AI搜索"

# ============================================
# 数据源配置
# ============================================
data_sources:
  primary:
    - name: "海关总署"
      type: "web_search"
      priority: 1
      data_types:
        - import_volume
        - import_value
        - trade_partners
        
    - name: "上海油气交易中心"
      type: "web_fetch"
      priority: 2
      data_types:
        - trading_volume
        - price_index
        
    - name: "重庆油气交易中心"
      type: "web_fetch"
      priority: 3
      data_types:
        - regional_prices
        - transaction_data
        
  fallback:
    - name: "隆众资讯"
      type: "web_search"
      priority: 4
      
    - name: "卓创资讯"
      type: "web_search"
      priority: 5
      
    - name: "Mysteel"
      type: "web_search"
      priority: 6

# ============================================
# 采集任务配置
# ============================================
collection_tasks:
  import_data:
    description: "中国LNG进口数据"
    frequency: "daily"
    timeout: 60
    required: true
    required_fields:
      - 月度进口量（万吨）
      - 主要进口来源国
      - 进口均价
      - 数据来源
      
  trade_flow:
    description: "贸易流分析"
    frequency: "daily"
    timeout: 60
    required_fields:
      - 主要进口来源占比
      - 长期协议vs现货比例
      - 贸易路线变化
      
  market_share:
    description: "市场份额分析"
    frequency: "weekly"
    timeout: 30
    required_fields:
      - 主要进口商份额
      - 接收站利用率
      - 区域分布

# ============================================
# 验证规则
# ============================================
validation_rules:
  import_volume:
    min: 0
    max: 1000
    unit: "万吨/月"
    
  import_price:
    min: 200
    max: 1000
    unit: "美元/吨"

# ============================================
# 置信度评分标准
# ============================================
confidence_scoring:
  A:  # 90-100分
    criteria:
      - "海关总署官方数据"
      - "数据完整无缺失"
      
  B:  # 75-89分
    criteria:
      - "交易中心官方数据"
      - "可能有轻微延迟"
      
  C:  # 60-74分
    criteria:
      - "行业媒体数据"
      - "估算成分"
      
  D:  # <60分
    criteria:
      - "单一来源"
      - "来源不明确"

# ============================================
# 输出格式
# ============================================
output:
  report_section: "中国LNG进口分析"
  required_metrics:
    - 月度进口量
    - 主要进口来源国
    - 进口均价
    - 贸易流分析
    - 市场份额
    - 数据来源清单
    - 置信度评级
