# 镜史助理 - 第10位专业助理
# 卦象: 乾☰ - 历史对比
# 版本: v5.1
# 更新: 2026-04-11 - 统一搜索工具白名单

name: "镜史"
code: "jingshi"
hexagram: "乾☰"
responsibility: "历史对比+季节性分析"
capability_score: 0.80

# ============================================
# 搜索工具白名单（v5.1统一 - 6个工具）
# ============================================
search_tools:
  # 基础工具（3个）
  core:
    - name: "搜狗微信搜索"
      tool: "web_fetch"
      priority: 1
      description: "公众号文章搜索"
      
    - name: "百度搜索"
      tool: "web_fetch"
      priority: 2
      description: "网页端数据补充"
      
    - name: "Exa搜索"
      tool: "mcporter"
      server: "exa"
      tool_name: "web_search_exa"
      priority: 3
      description: "国际历史数据"
      
  # 已批准技能（3个）
  approved_skills:
    - name: "cn-web-search"
      priority: 4
      description: "中文多引擎聚合"
      
    - name: "web-search-free"
      priority: 5
      description: "Exa免费AI搜索"
      
    - name: "tavily-search"
      priority: 6
      description: "高质量AI搜索"

# ============================================
# 历史数据配置
# ============================================
historical_data:
  time_ranges:
    - 1年
    - 3年
    - 5年
    - 10年
    
  comparison_types:
    - 同比（YoY）
    - 环比（MoM）
    - 季节性对比
    - 周期对比

# ============================================
# 采集任务配置
# ============================================
collection_tasks:
  price_history:
    description: "历史价格对比"
    frequency: "daily"
    timeout: 60
    required_fields:
      - 当前价格vs去年同期
      - 当前价格vs历史均值
      - 价格分位数（1年/3年/5年）
      - 数据来源
      
  seasonal_pattern:
    description: "季节性规律"
    frequency: "daily"
    timeout: 60
    required_fields:
      - 旺季/淡季特征
      - 季节性价格区间
      - 历史同期表现
      
  cycle_analysis:
    description: "周期分析"
    frequency: "weekly"
    timeout: 60
    required_fields:
      - 当前周期位置
      - 历史周期对比
      - 周期转折点识别
      
  event_comparison:
    description: "事件对比"
    frequency: "weekly"
    timeout: 30
    required_fields:
      - 类似历史事件
      - 事件影响对比
      - 市场反应差异

# ============================================
# 验证规则
# ============================================
validation_rules:
  historical_accuracy:
    min: 0.7
    max: 1.0
    unit: "准确率"

# ============================================
# 置信度评分标准
# ============================================
confidence_scoring:
  A:  # 90-100分
    criteria:
      - "5年以上历史数据"
      - "多周期验证"
      
  B:  # 75-89分
    criteria:
      - "3年以上历史数据"
      - "主要周期验证"
      
  C:  # 60-74分
    criteria:
      - "1-3年历史数据"
      - "部分验证"
      
  D:  # <60分
    criteria:
      - "少于1年数据"
      - "缺乏验证"

# ============================================
# 输出格式
# ============================================
output:
  report_section: "历史对比"
  required_metrics:
    - 历史价格对比
    - 季节性分析
    - 周期位置
    - 事件对比
    - 历史规律总结
    - 数据来源清单
    - 置信度评级
