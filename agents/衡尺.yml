# 衡尺助理 - 第6位专业助理
# 卦象: 坎☵ - 价格驱动因素分析
# 版本: v5.1
# 更新: 2026-04-11 - 统一搜索工具白名单

name: "衡尺"
code: "hengchi"
hexagram: "坎☵"
responsibility: "五因子驱动因素分析"
capability_score: 0.85

# ============================================
# 搜索工具白名单（v5.1统一 - 6个工具）
# ============================================
search_tools:
  # 基础工具（3个）
  core:
    - name: "搜狗微信搜索"
      tool: "web_fetch"
      priority: 1
      description: "公众号文章搜索"
      
    - name: "百度搜索"
      tool: "web_fetch"
      priority: 2
      description: "网页端数据补充"
      
    - name: "Exa搜索"
      tool: "mcporter"
      server: "exa"
      tool_name: "web_search_exa"
      priority: 3
      description: "国际市场驱动因素"
      
  # 已批准技能（3个）
  approved_skills:
    - name: "cn-web-search"
      priority: 4
      description: "中文多引擎聚合"
      
    - name: "web-search-free"
      priority: 5
      description: "Exa免费AI搜索"
      
    - name: "tavily-search"
      priority: 6
      description: "高质量AI搜索"

# ============================================
# 五因子分析框架
# ============================================
five_factors:
  demand:
    name: "需求因子"
    indicators:
      - 全球GDP增速
      - 制造业PMI
      - 终端用气需求
      - 季节性需求变化
      
  supply:
    name: "供给因子"
    indicators:
      - OPEC+产量政策
      - 美国页岩油产量
      - LNG出口产能
      - 非OPEC产能
      
  inventory:
    name: "库存因子"
    indicators:
      - EIA/API库存
      - OECD库存
      - 战略储备
      
  dollar:
    name: "美元因子"
    indicators:
      - 美元指数(DXY)
      - 美联储政策
      - 利率水平
      
  risk:
    name: "风险因子"
    indicators:
      - VIX指数
      - 地缘冲突
      - 投机持仓(COT)
      - 风险溢价

# ============================================
# 采集任务配置
# ============================================
collection_tasks:
  macro_indicators:
    description: "宏观经济指标"
    frequency: "daily"
    timeout: 60
    required_fields:
      - 美元指数
      - 全球主要经济体PMI
      - 美联储政策动态
      
  supply_factors:
    description: "供给端因素"
    frequency: "daily"
    timeout: 60
    required_fields:
      - OPEC+产量决策
      - 美国钻机数
      - LNG项目投产进度
      
  geopolitical:
    description: "地缘政治风险"
    frequency: "daily"
    timeout: 30
    required_fields:
      - 中东局势
      - 俄乌冲突影响
      - 霍尔木兹海峡风险
      - 其他地缘事件
      
  market_sentiment:
    description: "市场情绪"
    frequency: "daily"
    timeout: 30
    required_fields:
      - COT持仓报告
      - VIX指数
      - 分析师观点汇总

# ============================================
# 输出格式
# ============================================
output:
  report_section: "价格驱动因素分析"
  required_metrics:
    - 五因子评分
    - 需求因子分析
    - 供给因子分析
    - 库存因子分析
    - 美元因子分析
    - 风险因子分析
    - 综合驱动结论
    - 数据来源清单
    - 置信度评级
