# 金算助理 - 第8位专业助理
# 卦象: 艮☶ - 产业链利润分析
# 版本: v5.1
# 更新: 2026-04-11 - 统一搜索工具白名单

name: "金算"
code: "jinsuan"
hexagram: "艮☶"
responsibility: "产业链利润+成本分析"
capability_score: 0.85

# ============================================
# 搜索工具白名单（v5.1统一 - 6个工具）
# ============================================
search_tools:
  # 基础工具（3个）
  core:
    - name: "搜狗微信搜索"
      tool: "web_fetch"
      priority: 1
      description: "公众号文章搜索"
      
    - name: "百度搜索"
      tool: "web_fetch"
      priority: 2
      description: "网页端数据补充"
      
    - name: "Exa搜索"
      tool: "mcporter"
      server: "exa"
      tool_name: "web_search_exa"
      priority: 3
      description: "国际成本数据交叉验证"
      
  # 已批准技能（3个）
  approved_skills:
    - name: "cn-web-search"
      priority: 4
      description: "中文多引擎聚合"
      
    - name: "web-search-free"
      priority: 5
      description: "Exa免费AI搜索"
      
    - name: "tavily-search"
      priority: 6
      description: "高质量AI搜索"

# ============================================
# 产业链分析框架
# ============================================
value_chain:
  upstream:
    name: "上游"
    segments:
      - 天然气开采
      - 液化处理
      - 运输成本
      
  midstream:
    name: "中游"
    segments:
      - LNG运输船
      - 航运成本
      - 再气化
      
  downstream:
    name: "下游"
    segments:
      - 城市燃气
      - 工业用户
      - 发电企业

# ============================================
# 采集任务配置
# ============================================
collection_tasks:
  production_cost:
    description: "生产成本分析"
    frequency: "daily"
    timeout: 60
    required_fields:
      - 美国LNG生产成本
      - 卡塔尔LNG生产成本
      - 澳大利亚LNG生产成本
      - 成本变化趋势
      
  shipping_cost:
    description: "运输成本分析"
    frequency: "daily"
    timeout: 60
    required_fields:
      - LNG船运费率
      - 主要航线成本
      - 船舶租金
      
  profit_analysis:
    description: "产业链利润分析"
    frequency: "daily"
    timeout: 60
    required_fields:
      - 上游利润
      - 中游利润
      - 下游利润
      - 利润分配变化
      
  cost_structure:
    description: "成本结构分析"
    frequency: "weekly"
    timeout: 30
    required_fields:
      - 原料气成本占比
      - 液化成本占比
      - 运输成本占比
      - 再气化成本占比

# ============================================
# 验证规则
# ============================================
validation_rules:
  production_cost:
    min: 2
    max: 8
    unit: "$/MMBtu"
    
  shipping_cost:
    min: 0.5
    max: 5
    unit: "$/MMBtu"

# ============================================
# 置信度评分标准
# ============================================
confidence_scoring:
  A:  # 90-100分
    criteria:
      - "公司财报/官方数据"
      - "数据完整无缺失"
      
  B:  # 75-89分
    criteria:
      - "行业研究机构数据"
      - "可能有轻微延迟"
      
  C:  # 60-74分
    criteria:
      - "媒体估算数据"
      - "估算成分"
      
  D:  # <60分
    criteria:
      - "单一来源"
      - "来源不明确"

# ============================================
# 输出格式
# ============================================
output:
  report_section: "产业链利润分析"
  required_metrics:
    - 生产成本分析
    - 运输成本分析
    - 产业链利润分配
    - 成本结构变化
    - 利润趋势预测
    - 数据来源清单
    - 置信度评级
