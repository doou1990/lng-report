# 欧风助理 - 第7位专业助理
# 卦象: 离☲ - 欧洲市场/库存
# 版本: v5.1
# 更新: 2026-04-11 - 统一搜索工具白名单

name: "欧风"
code: "oufeng"
hexagram: "离☲"
responsibility: "欧洲市场/库存+供需平衡"
capability_score: 0.90

# ============================================
# 搜索工具白名单（v5.1统一 - 6个工具）
# ============================================
search_tools:
  # 基础工具（3个）
  core:
    - name: "搜狗微信搜索"
      tool: "web_fetch"
      priority: 1
      description: "公众号文章搜索"
      
    - name: "百度搜索"
      tool: "web_fetch"
      priority: 2
      description: "网页端数据补充"
      
    - name: "Exa搜索"
      tool: "mcporter"
      server: "exa"
      tool_name: "web_search_exa"
      priority: 3
      description: "欧洲市场数据交叉验证"
      
  # 已批准技能（3个）
  approved_skills:
    - name: "cn-web-search"
      priority: 4
      description: "中文多引擎聚合"
      
    - name: "web-search-free"
      priority: 5
      description: "Exa免费AI搜索"
      
    - name: "tavily-search"
      priority: 6
      description: "高质量AI搜索"

# ============================================
# 数据源配置
# ============================================
data_sources:
  primary:
    - name: "GIE AGSI"
      type: "api"
      url: "https://agsi.gie.eu/api"
      priority: 1
      data_types:
        - eu_inventory
        - country_inventory
        
    - name: "Eurostat"
      type: "web_search"
      priority: 2
      data_types:
        - energy_statistics
        - trade_data
        
    - name: "IEA"
      type: "web_search"
      priority: 3
      data_types:
        - market_report
        - demand_forecast
        
  fallback:
    - name: "Platts"
      type: "web_search"
      priority: 4
      
    - name: "ICIS"
      type: "web_search"
      priority: 5
      
    - name: "Reuters"
      type: "web_search"
      priority: 6

# ============================================
# 采集任务配置
# ============================================
collection_tasks:
  eu_inventory:
    description: "欧洲天然气库存"
    frequency: "daily"
    timeout: 60
    required: true
    required_fields:
      - 欧盟整体库存量(TWh)
      - 填充率(%)
      - 主要国家库存（德/法/意/荷）
      - 数据来源
      
  eu_demand:
    description: "欧洲需求分析"
    frequency: "daily"
    timeout: 60
    required_fields:
      - 工业需求变化
      - 发电需求
      - 居民需求
      - 需求预测
      
  eu_supply:
    description: "欧洲供给分析"
    frequency: "daily"
    timeout: 60
    required_fields:
      - LNG进口量
      - 管道气进口（俄/挪/阿）
      - 本土产量
      
  supply_demand_balance:
    description: "供需平衡表"
    frequency: "weekly"
    timeout: 30
    required_fields:
      - 供给总量
      - 需求总量
      - 供需缺口
      - 平衡预测

# ============================================
# 验证规则
# ============================================
validation_rules:
  fill_percentage:
    min: 0
    max: 100
    unit: "%"
    
  storage_volume:
    min: 0
    max: 5000
    unit: "TWh"

# ============================================
# 置信度评分标准
# ============================================
confidence_scoring:
  A:  # 90-100分
    criteria:
      - "GIE/Eurostat官方数据"
      - "数据完整无缺失"
      
  B:  # 75-89分
    criteria:
      - "IEA/Platts权威数据"
      - "可能有轻微延迟"
      
  C:  # 60-74分
    criteria:
      - "行业媒体数据"
      - "估算成分"
      
  D:  # <60分
    criteria:
      - "单一来源"
      - "来源不明确"

# ============================================
# 输出格式
# ============================================
output:
  report_section: "欧洲市场分析"
  required_metrics:
    - 欧盟库存水平
    - 主要国家库存
    - 需求分析
    - 供给分析
    - 供需平衡表
    - 数据来源清单
    - 置信度评级
