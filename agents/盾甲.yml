# 盾甲助理 - 第9位专业助理
# 卦象: 兑☱ - 投资评级
# 版本: v5.1
# 更新: 2026-04-11 - 统一搜索工具白名单

name: "盾甲"
code: "dunjia"
hexagram: "兑☱"
responsibility: "投资评级+机构观点"
capability_score: 0.85

# ============================================
# 搜索工具白名单（v5.1统一 - 6个工具）
# ============================================
search_tools:
  # 基础工具（3个）
  core:
    - name: "搜狗微信搜索"
      tool: "web_fetch"
      priority: 1
      description: "公众号文章搜索"
      
    - name: "百度搜索"
      tool: "web_fetch"
      priority: 2
      description: "网页端数据补充"
      
    - name: "Exa搜索"
      tool: "mcporter"
      server: "exa"
      tool_name: "web_search_exa"
      priority: 3
      description: "国际机构观点"
      
  # 已批准技能（3个）
  approved_skills:
    - name: "cn-web-search"
      priority: 4
      description: "中文多引擎聚合"
      
    - name: "web-search-free"
      priority: 5
      description: "Exa免费AI搜索"
      
    - name: "tavily-search"
      priority: 6
      description: "高质量AI搜索"

# ============================================
# 数据源配置
# ============================================
data_sources:
  primary:
    - name: "StockAnalysis"
      type: "web_search"
      priority: 1
      data_types:
        - analyst_ratings
        - price_targets
        
    - name: "TipRanks"
      type: "web_search"
      priority: 2
      data_types:
        - analyst_consensus
        - smart_score
        
    - name: "Zacks"
      type: "web_search"
      priority: 3
      data_types:
        - investment_research
        - earnings_estimates
        
    - name: "TheStreet"
      type: "web_search"
      priority: 4
      data_types:
        - market_analysis
        - stock_recommendations
        
  fallback:
    - name: "Investing.com"
      type: "web_search"
      priority: 5
      
    - name: "Seeking Alpha"
      type: "web_search"
      priority: 6

# ============================================
# 采集任务配置
# ============================================
collection_tasks:
  analyst_ratings:
    description: "分析师评级"
    frequency: "daily"
    timeout: 60
    required_fields:
      - 主要LNG公司评级
      - 目标价
      - 评级变化
      - 数据来源
      
  institutional_views:
    description: "机构观点汇总"
    frequency: "daily"
    timeout: 60
    required_fields:
      - 投行观点
      - 研究机构观点
      - 多空分歧
      
  market_outlook:
    description: "市场展望"
    frequency: "daily"
    timeout: 60
    required_fields:
      - 短期展望（1-3个月）
      - 中期展望（6-12个月）
      - 长期展望（1年以上）
      
  risk_assessment:
    description: "风险评估"
    frequency: "weekly"
    timeout: 30
    required_fields:
      - 上行风险
      - 下行风险
      - 投资建议

# ============================================
# 验证规则
# ============================================
validation_rules:
  rating:
    valid_values: ["强烈买入", "买入", "持有", "卖出", "强烈卖出"]
    
  price_target:
    min: 0
    max: 1000
    unit: "美元"

# ============================================
# 置信度评分标准
# ============================================
confidence_scoring:
  A:  # 90-100分
    criteria:
      - "多家机构一致评级"
      - "数据完整无缺失"
      
  B:  # 75-89分
    criteria:
      - "主要机构评级"
      - "可能有轻微分歧"
      
  C:  # 60-74分
    criteria:
      - "单一机构评级"
      - "估算成分"
      
  D:  # <60分
    criteria:
      - "来源不明确"
      - "缺乏一致性"

# ============================================
# 输出格式
# ============================================
output:
  report_section: "投资评级"
  required_metrics:
    - 分析师评级汇总
    - 目标价区间
    - 机构观点摘要
    - 市场展望
    - 风险评估
    - 数据来源清单
    - 置信度评级
